<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Jin 知识库</title>
<style>
:root{--bg:#f5f6fa;--card:#ffffff;--accent:#2563eb;--accent2:#0ea5e9;--text:#1e293b;--text2:#475569;--border:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

/* Header */
.header{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0ea5e9 100%);color:#fff;padding:48px 32px 60px;text-align:center;position:relative;overflow:flex-shrink:0}
.header::before{content:'';position:absolute;top:-80px;right:-60px;width:320px;height:320px;background:rgba(14,165,233,.06);border-radius:50%}
.header::after{content:'';position:absolute;bottom:-60px;left:-40px;width:240px;height:240px;background:rgba(37,99,235,.05);border-radius:50%}
.header-content{position:relative;z-index:2;max-width:720px;margin:0 auto}
.header h1{font-size:32px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.header .subtitle{font-size:16px;color:#94a3b8;margin-bottom:12px}
.header .author{font-size:13px;color:#60a5fa;font-style:italic}

/* Main */
.main{flex:1;padding:40px 32px;max-width:960px;margin:0 auto;width:100%}
.section-title{font-size:18px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:inline-block;width:4px;height:20px;background:var(--accent);border-radius:2px}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:40px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;transition:all .25s;cursor:pointer;position:relative;overflow:hidden;display:block}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.1);border-color:var(--accent)}
.card .card-icon{font-size:40px;margin-bottom:16px;display:block}
.card .card-title{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text)}
.card .card-desc{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.card .card-meta{display:flex;gap:16px;font-size:13px;color:var(--text2)}
.card .card-meta span{display:flex;align-items:center;gap:4px}
.card .card-arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--border);transition:all .2s}
.card:hover .card-arrow{color:var(--accent);right:16px}

/* Coming soon */
.card-soon{opacity:.6;cursor:default}
.card-soon:hover{transform:none;box-shadow:none;border-color:var(--border)}
.card-soon:hover .card-arrow{color:var(--border);right:20px}
.card-soon .card-badge{font-size:11px;background:#f1f5f9;color:var(--text2);padding:2px 10px;border-radius:4px;font-weight:500;display:inline-block;margin-bottom:12px}

/* Footer */
.footer{text-align:center;padding:24px;font-size:12px;color:#94a3b8;border-top:1px solid var(--border)}

@media(max-width:768px){
  .header h1{font-size:24px}
  .header{padding:36px 20px 48px}
  .main{padding:28px 20px}
  .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1>Alex Jin 知识库</h1>
    <p class="subtitle">系统化学习资料整理 &middot; 专业领域知识沉淀</p>
    <p class="author">Created By Alex Jin</p>
  </div>
</div>

<div class="main">
  <div class="section-title">学习模块</div>
  <div class="cards">

    <!-- 半导体硅片材料 -->
    <a href="semiconductor/index.html" class="card">
      <span class="card-icon">&#128220;</span>
      <div class="card-title">半导体硅片材料</div>
      <div class="card-desc">从晶体物理到产业格局，系统性覆盖半导体硅片完整技术体系。适合行业新人、销售及技术支持人员学习。</div>
      <div class="card-meta">
        <span>10 模块</span>
        <span>60 章节</span>
        <span>已完结</span>
      </div>
      <span class="card-arrow">&#10095;</span>
    </a>

    <!-- 海外销售学习之路 -->
    <div class="card card-soon">
      <span class="card-badge">即将上线</span>
      <span class="card-icon">&#127758;</span>
      <div class="card-title">海外销售学习之路</div>
      <div class="card-desc">海外市场开拓、客户关系管理、跨文化商务沟通、国际贸易实务等海外销售全流程知识体系。</div>
      <div class="card-meta">
        <span>准备中</span>
        <span>敬请期待</span>
      </div>
      <span class="card-arrow">&#10095;</span>
    </div>

  </div>
</div>

<div class="footer">
  &copy; Alex Jin. All rights reserved.
</div>

</body>
</html>
