  <h2>下游客户：Foundry与IDM</h2>
  <div class="chap-desc">硅片的最终消费者</div>
</div>
<h3>晶圆代工厂（Foundry）</h3>
<p>Foundry为没有晶圆生产能力的芯片设计公司（Fabless）提供制造服务，是300mm硅片的<strong>最大消费群体</strong>。主要Foundry包括：</p>
<ul>
  <li><strong>台积电（TSMC）</strong>：全球最大Foundry，300mm硅片最大单一客户</li>
  <li><strong>三星代工</strong>：韩国巨头，自用+外销</li>
  <li><strong>中芯国际（SMIC）</strong>：中国大陆最大Foundry</li>
  <li><strong>华虹宏力</strong>：中国大陆特色工艺Foundry</li>
</ul>
<p>Foundry特点：需求量巨大且稳定（通常签订<strong>LTA长期供货协议</strong>），认证周期1~2年，一旦进入供应链关系稳定。</p>
<h3>集成器件制造商（IDM）</h3>
<p>IDM既设计芯片又自己生产晶圆，与硅片供应商关系更紧密，通常进行<strong>深度技术合作和联合开发</strong>。主要IDM包括：</p>
<ul>
  <li><strong>英特尔、三星、SK海力士、美光</strong>：存储和逻辑芯片</li>
  <li><strong>英飞凌、意法半导体、德州仪器</strong>：功率和模拟芯片</li>
  <li><strong>华润微、士兰微</strong>：中国本土IDM</li>
</ul>
<div class="callout callout-success">
  <div class="callout-title">客户采购模式</div>
  <p>Foundry客户通常按<strong>长期协议（LTA）</strong>采购，价格相对稳定。IDM客户更倾向于<strong>项目制采购</strong>，每启动一个新项目就会进行新一轮的供应商评估和认证。</p>
</div>

<h3>全球半导体产业图谱 —— 半导体制造产业链</h3>
<p>半导体制造产业链涵盖<strong>IC设计 → IC制造 → IC封测</strong>三大核心环节。IC设计又分为数字电路（CPU/GPU/FPGA/ASIC/存储器）和模拟电路（信号链/电源管理）。以下按产业链环节和细分赛道梳理全球主要厂商。</p>

"s9-5":`<div class="chapter-header">
  <div class="chap-num">模块九 · 第 5/7 节</div>
  <h2>AI与新能源汽车驱动需求</h2>
  <div class="chap-desc">当前硅片行业增长的两大核心引擎</div>
</div>
<h3>AI算力需求</h3>
<p>2025年全球半导体硅片出货面积<strong>128.24亿平方英寸</strong>（+5.4%），扭转了自2023年以来的连续下降势头。AI应用（ChatGPT、大语言模型、AI服务器）直接拉动对<strong>高性能计算芯片</strong>（GPU、AI加速器、HBM高带宽存储）的需求，300mm外延片和抛光片需求激增。信越和SUMCO在2025年联合投资<strong>1500亿日元</strong>新增20万片/月超平整产能，专供2nm和3nm先进制程。</p>
<h3>新能源汽车（NEV）</h3>
<p>新能源汽车的电机驱动、车载充电器（OBC）、DC-DC转换器、电池管理系统（BMS）等都需要大量<strong>功率器件</strong>（IGBT、SiC MOSFET）。一辆新能源汽车使用的功率器件价值量约<strong>300~500美元</strong>，是传统燃油车的5~10倍。功率器件用8英寸和6英寸重掺外延片需求保持<strong>15~20%</strong>的年均复合增长率。</p>
<table>
<tr><th>驱动力</th><th>拉动的产品</th><th>增速</th><th>关键客户</th></tr>
<tr><td>AI服务器</td><td>300mm高端逻辑硅片</td><td>&gt;30%</td><td>英伟达、AMD、谷歌</td></tr>
<tr><td>AI电源管理</td><td>8英寸重掺外延片</td><td>&gt;20%</td><td>TI、ADI、英飞凌</td></tr>
<tr><td>新能源汽车</td><td>8/6英寸重掺外延片</td><td>15~20%</td><td>英飞凌、安森美、比亚迪</td></tr>
<tr><td>5G手机</td><td>SOI片、200mm硅片</td><td>5~10%</td><td>苹果、高通、联发科</td></tr>
</table>`,
"s9-6":`<div class="chapter-header">
  <div class="chap-num">模块九 · 第 6/7 节</div>
  <h2>国产替代趋势与机遇</h2>
  <div class="chap-desc">供应链安全驱动下的历史性机遇</div>
</div>
<h3>国产替代的背景</h3>
<p>中国大陆是全球最大的半导体硅片消费市场，2025年市场规模约<strong>700亿元</strong>（+16%），占全球<strong>22%</strong>。但高端硅片进口依赖度仍高，<strong>供应链安全</strong>成为晶圆厂采购决策的核心考量。2026年中国大陆12英寸晶圆产能将达<strong>321万片/月</strong>（全球1/3），本土硅片需求巨大。</p>
<h3>政策支持</h3>
<ul>
  <li>"十四五"规划将半导体硅片列为重点突破领域</li>
  <li>国家大基金（集成电路产业投资基金）对硅片企业进行股权投资</li>
  <li>税收优惠、研发补贴、土地和能源支持</li>
</ul>
<h3>市场机遇</h3>
<p>本土晶圆厂（<strong>中芯国际、华虹宏力、长江存储、长鑫存储</strong>等）在扩产过程中，纷纷加大对国产硅片的认证和采购力度。国产替代为本土硅片厂商提供了难得的发展窗口期。</p>
<h3>最新突破</h3>
<ul>
  <li>12英寸硅片已实现<strong>14~28nm量产</strong>，<strong>7nm通过验证</strong></li>
  <li>车规级/外延片等高附加值产品占比持续提升</li>
  <li>电子级多晶硅国产化加速（鑫华半导体2026年科创板IPO，纯度达9N以上）</li>
  <li>本土厂商规划12英寸产能<strong>700万片/月+</strong>，2026~2027年集中释放</li>
</ul>
<h3>面临的挑战</h3>
<table>
<tr><th>挑战</th><th>说明</th></tr>
<tr><td>先进制程差距</td><td>5nm及以下先进节点仍需攻坚，良率和一致性与国际巨头有差距</td></tr>
<tr><td>客户认证壁垒</td><td>认证周期长（1~2年），高端客户切换供应商极为谨慎</td></tr>
<tr><td>持续亏损压力</td><td>沪硅产业2025年净利润约-14.76亿元，折旧和研发投入巨大</td></tr>
<tr><td>西方出口管制</td><td>部分先进设备和材料受限，影响高端产品研发进度</td></tr>
</table>
<div class="callout callout-success">
  <div class="callout-title">前景展望</div>
  <p>国产替代大趋势不可逆转。预计2030年中国大陆300mm硅片国产化率有望达到<strong>20~30%</strong>。沪硅产业以全球前五大为长远目标，正从"国内龙头"向"全球参与者"转型。</p>
</div>`,
"s10-1":`<div class="chapter-header">
  <div class="chap-num">模块十 · 第 1/6 节</div>
  <h2>缺陷工程：位错/层错/微缺陷</h2>
  <div class="chap-desc">硅片中的晶体缺陷类型及其影响</div>
</div>
<h3>位错（Dislocation）</h3>
<p>位错是硅晶格中原子排列的线缺陷，分为<strong>刃位错（Edge Dislocation）</strong>和<strong>螺位错（Screw Dislocation）</strong>。位错会：</p>
<ul>
  <li>作为<strong>复合中心</strong>，降低少数载流子寿命</li>
  <li>引入<strong>应力场</strong>，影响器件可靠性</li>
  <li>在高温工艺中<strong>滑移和增殖</strong>，扩展缺陷区域</li>
</ul>
<p>CZ硅片的位错密度通常要求 <strong>&lt;100/cm²</strong>，高端产品要求 &lt;10/cm²。</p>
<h3>层错（Stacking Fault）</h3>
<p>层错是硅晶格中堆叠顺序的错误，通常由外延生长过程中的缺陷或衬底表面的损伤引发。层错会在外延层中形成<strong>金字塔形缺陷</strong>，影响器件性能和良率。外延片的质量控制中，<strong>层错密度</strong>是关键指标之一（通常要求 &lt;100/cm²）。</p>
<h3>微缺陷（Micro Defects）</h3>
<p>包括<strong>COP（晶体原生颗粒）</strong>、<strong>BMD（体微缺陷/氧沉淀）</strong>、<strong>点缺陷团簇</strong>等。这些纳米级缺陷虽然尺寸极小，但在先进制程中可能对器件性能产生显著影响。</p>`,
"s10-2":`<div class="chapter-header">
  <div class="chap-num">模块十 · 第 2/6 节</div>
  <h2>硅片包装与存储要求</h2>
  <div class="chap-desc">确保硅片在运输和存储中不受污染</div>
</div>
<h3>包装流程</h3>
<ol>
  <li>清洗合格的硅片放入专用<strong>片架（Cassette）</strong>（PFA或PEEK材料）</li>
  <li>片架放入<strong>FOSB（Front-Opening Shipping Box）</strong>或密封袋</li>
  <li>FOSB内充满<strong>高纯氮气（N₂）</strong>，防止表面氧化和污染</li>
  <li>外包装标签标注完整规格信息</li>
</ol>
<h3>标签信息</h3>
<p>直径、晶向、导电类型、掺杂剂、电阻率范围、厚度、抛光类型、数量、批号、生产日期等。</p>
<h3>存储条件</h3>
<div class="kv-grid">
  <div class="k">温度</div><div class="v">15~25℃</div>
  <div class="k">相对湿度</div><div class="v">&lt;50%</div>
  <div class="k">光照</div><div class="v">避免阳光直射</div>
  <div class="k">保质期</div><div class="v">6~12个月（取决于客户要求）</div>
</div>
<div class="callout callout-warn">
  <div class="callout-title">超期处理</div>
  <p>超过保质期的硅片需要重新进行质量检验（包括LPD、金属污染、表面粗糙度等）才能出货。部分客户不接受超期产品，需在合同中明确约定。</p>
</div>`,
"s10-3":`<div class="chapter-header">
  <div class="chap-num">模块十 · 第 3/6 节</div>
  <h2>硅片常见质量缺陷与根因分析</h2>
  <div class="chap-desc">遇到问题时的排查指南</div>
</div>
<table>
<tr><th>缺陷</th><th>描述</th><th>可能原因</th><th>解决方法</th></tr>
<tr><td><strong>Edge Chip</strong></td><td>边缘崩边</td><td>倒角参数不当、搬运碰撞</td><td>调整倒角砂轮、优化搬运流程</td></tr>
<tr><td><strong>Scratch</strong></td><td>表面划痕</td><td>CMP抛光垫污染、颗粒嵌入</td><td>更换抛光垫、加强清洗</td></tr>
<tr><td><strong>Haze</strong></td><td>表面雾状缺陷</td><td>CMP化学作用过强、清洗不彻底</td><td>调整抛光液pH、加强SC-1清洗</td></tr>
<tr><td><strong>High LPD</strong></td><td>颗粒数超标</td><td>清洗不净、洁净室污染</td><td>优化RCA流程、检查洁净室等级</td></tr>
<tr><td><strong>Metal Contamination</strong></td><td>金属污染超标</td><td>设备磨损、化学品不纯</td><td>TXRF溯源、更换耗材</td></tr>
<tr><td><strong>High Bow/Warp</strong></td><td>翘曲度超标</td><td>切片应力、研磨不均匀</td><td>优化切割参数、调整研磨压力</td></tr>
<tr><td><strong>TTV Out of Spec</strong></td><td>厚度不均</td><td>研磨盘不平、CMP不均匀</td><td>修整研磨盘、优化CMP参数</td></tr>
<tr><td><strong>Resistivity Out of Spec</strong></td><td>电阻率超标</td><td>掺杂计算错误、拉晶参数漂移</td><td>重新计算投料量、校准拉晶炉</td></tr>
</table>
<div class="callout callout-success">
  <div class="callout-title">质量分析流程</div>
  <p>收到客户投诉 → 确认缺陷类型 → 追溯生产批次和工艺参数 → 进行根因分析（5 Why或鱼骨图） → 制定纠正措施（CA）和预防措施（PA） → 提交8D报告给客户。</p>
</div>`,
"s10-4":`<div class="chapter-header">
  <div class="chap-num">模块十 · 第 4/6 节</div>
  <h2>客户认证流程（Qualification）</h2>
  <div class="chap-desc">如何进入晶圆厂的供应商名单</div>
</div>
<h3>认证四阶段</h3>
<ol>
  <li><strong>材料评估（Material Evaluation）</strong>：客户提供初步规格，硅片厂商提供样品，客户进行基础测试（电阻率、厚度、LPD等），周期1~3个月</li>
  <li><strong>小批量试产（Pilot Run）</strong>：样品通过初筛后，客户用小批量硅片进行试产流片，评估器件性能和良率，周期3~6个月</li>
  <li><strong>可靠性测试（Reliability Test）</strong>：通过试产后进行长期可靠性测试（HTOL、TDDB等），周期3~6个月</li>
  <li><strong>量产导入（Production Ramp）</strong>：通过全部测试后进入供应商名单，开始小批量供货，逐步放量</li>
</ol>
<h3>认证周期</h3>
<p>完整认证周期通常为 <strong>1~2年</strong>。认证通过后，客户通常不会轻易更换供应商（切换成本极高），因此"通过认证"意味着长期稳定的订单关系。</p>
<h3>认证关键文档</h3>
<ul>
  <li><strong>PSA（Process Stability Audit）</strong>：工艺稳定性审核</li>
  <li><strong>COA（Certificate of Analysis）</strong>：每批出货的质量分析报告</li>
  <li><strong>PCN（Process Change Notification）</strong>：工艺变更通知</li>
  <li><strong>8D报告</strong>：问题解决报告</li>
</ul>
<h3>完整产品验证链路</h3>
<p>以下展示了从商机阶段到量产的完整产品验证链路，涵盖PRS（工艺验证）、STR（小批量验证）、MSTR（中批量验证）到FullRLS（全面量产）的各阶段流程，以及每个阶段对应的核心测试环节。</p>
<div style="display:flex;gap:20px;flex-wrap:wrap;margin:24px 0;">
  <!-- Left side: Flow chart -->
  <div style="flex:1;min-width:300px;max-width:480px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:20px;">
    <h4 style="margin:0 0 16px 0;color:#1e293b;font-size:15px;text-align:center;">认证阶段流程图</h4>
    <svg viewBox="0 0 460 540" style="width:100%;height:auto;background:#ffffff;border-radius:8px;">
      <!-- Background ring -->
      <ellipse cx="230" cy="270" rx="185" ry="200" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="8,4"/>

      <!-- Center: FullRLS (final stage) -->
      <ellipse cx="230" cy="275" rx="54" ry="34" fill="#1e40af" stroke="#1e3a5f" stroke-width="2"/>
      <text x="230" y="280" text-anchor="middle" font-size="13" fill="white" font-weight="bold">FullRLS</text>

      <!-- ===== Stage 1: 商机阶段 (top) ===== -->
      <ellipse cx="230" cy="58" rx="50" ry="25" fill="#0f766e" stroke="#115e59" stroke-width="1.5"/>
      <text x="230" y="63" text-anchor="middle" font-size="11" fill="white" font-weight="600">商机阶段</text>

      <!-- ===== Stage 2: PRS (upper right) ===== -->
      <ellipse cx="385" cy="140" rx="38" ry="21" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="385" y="145" text-anchor="middle" font-size="12" fill="white" font-weight="600">PRS</text>
      <!-- PRS Pass -->
      <text x="385" y="170" text-anchor="middle" font-size="10" fill="#22c55e" font-weight="600">PRS Pass</text>
      <!-- PRS sub items -->
      <rect x="312" y="100" width="58" height="20" rx="9" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
      <text x="341" y="114" text-anchor="middle" font-size="9" fill="#1e40af">规格评审</text>
      <rect x="402" y="100" width="54" height="20" rx="9" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
      <text x="429" y="114" text-anchor="middle" font-size="9" fill="#1e40af">样品发货</text>

      <!-- ===== Stage 3: STR (right middle) ===== -->
      <ellipse cx="395" cy="275" rx="40" ry="23" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
      <text x="395" y="281" text-anchor="middle" font-size="13" fill="white" font-weight="600">STR</text>
      <!-- STR Pass -->
      <text x="395" y="310" text-anchor="middle" font-size="10" fill="#22c55e" font-weight="600">STR Pass</text>
      <!-- STR sub items -->
      <rect x="435" y="208" width="26" height="16" rx="7" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="0.8"/>
      <text x="448" y="219" text-anchor="middle" font-size="8" fill="#6b21a8">发货</text>
      <text x="448" y="240" text-anchor="middle" font-size="9" fill="#7c3aed">WAT测试</text>
      <text x="448" y="256" text-anchor="middle" font-size="9" fill="#7c3aed">CP测试</text>
      <text x="448" y="272" text-anchor="middle" font-size="9" fill="#7c3aed">FT可靠性</text>
      <rect x="435" y="320" width="26" height="16" rx="7" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="0.8"/>
      <text x="448" y="331" text-anchor="middle" font-size="8" fill="#6b21a8">Softlanding</text>
      <!-- STR Po -->
      <text x="360" y="218" text-anchor="middle" font-size="9" fill="#64748b">STR Po</text>

      <!-- ===== Stage 4: MSTR (lower left) ===== -->
      <ellipse cx="90" cy="390" rx="42" ry="23" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>
      <text x="90" y="396" text-anchor="middle" font-size="13" fill="white" font-weight="600">MSTR</text>
      <!-- MSTR Pass -->
      <text x="90" y="422" text-anchor="middle" font-size="10" fill="#22c55e" font-weight="600">MSTR Pass</text>
      <!-- MSTR sub items -->
      <rect x="18" y="358" width="30" height="16" rx="7" fill="#cffafe" stroke="#a5f3fc" stroke-width="0.8"/>
      <text x="33" y="369" text-anchor="middle" font-size="8" fill="#155e75">发货</text>
      <text x="33" y="390" text-anchor="middle" font-size="9" fill="#0891b2">WAT测试</text>
      <text x="33" y="406" text-anchor="middle" font-size="9" fill="#0891b2">CP测试</text>
      <!-- MSTR Po -->
      <text x="58" y="358" text-anchor="middle" font-size="9" fill="#64748b">MSTR Po</text>

      <!-- ===== Connecting Arrows: 商机 -> PRS -> STR -> MSTR -> FullRLS ===== -->
      <!-- Arrow 1: 商机阶段 -> PRS -->
      <path d="M 268 75 Q 320 90 352 122" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)"/>
      <!-- Arrow 2: PRS -> STR -->
      <path d="M 400 170 Q 415 210 405 248" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)"/>
      <!-- Arrow 3: STR -> MSTR (curved path going down-left) -->
      <path d="M 370 300 Q 280 360 130 390" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)"/>
      <!-- Arrow 4: MSTR -> FullRLS (center) -->
      <path d="M 130 385 Q 175 365 178 310" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)"/>

      <!-- Arrow marker definition -->
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
        </marker>
      </defs>
    </svg>
  </div>

  <!-- Right side: Three test modules -->
  <div style="flex:1;min-width:280px;max-width:480px;display:flex;flex-direction:column;gap:14px;">
    <!-- WAT测试 -->
    <div style="background:linear-gradient(135deg,#7aa7e0 0%,#a8cff8 100%);border-radius:10px;padding:14px;color:#1e3a5f;">
      <h4 style="margin:0 0 8px 0;font-size:12px;display:flex;align-items:center;gap:8px;">
        <span style="background:rgba(255,255,255,0.35);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">WAT测试</span>
        <span style="font-size:11px;opacity:0.75;font-weight:500;">—— 过程控制测试</span>
      </h4>
      <p style="margin:0 0 6px 0;font-size:12px;line-height:1.5;opacity:0.85;"><strong>详情：</strong>晶圆层测试，通过测量晶圆上的特定测试结构的电性参数来监控每一片晶圆的生产工艺质量，反映出晶圆是否达到了工艺规范要求，为晶圆是否能够进入封装阶段提供依据。</p>
      <p style="margin:0;font-size:12px;line-height:1.5;opacity:0.85;"><strong>测试对象：</strong>并非整个晶圆的所有芯片，而是晶圆上特定设计的测试图形。这些测试图形被称为"测试键"或"Test Key"，位于晶圆上的划片道（Scribe Line）中，它们不占用实际产品芯片的空间，但能反映出晶圆各个区域的制造工艺是否稳定和达标。</p>
    </div>

    <!-- CP测试 -->
    <div style="background:linear-gradient(135deg,#b08bd6 0%,#d4c0f5 100%);border-radius:10px;padding:14px;color:#4a1f6e;">
      <h4 style="margin:0 0 8px 0;font-size:12px;display:flex;align-items:center;gap:8px;">
        <span style="background:rgba(255,255,255,0.35);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">CP测试</span>
        <span style="font-size:11px;opacity:0.75;font-weight:500;">—— 晶圆筛选测试</span>
      </h4>
      <p style="margin:0 0 6px 0;font-size:12px;line-height:1.5;opacity:0.85;"><strong>作用：</strong>通过高精度探针卡进行电气性能的测试，针对晶圆上每一个Die进行探针测试，找出不合格的芯片并进行标记。</p>
      <p style="margin:0;font-size:12px;line-height:1.5;opacity:0.85;"><strong>目的：</strong>识别不合格芯片，减少后续封装和后续测试的成本，避免将有问题的芯片送入封装阶段。确保进入下一步装配的每个芯片都达到基本的功能要求，通过测试不同电性参数，如阈值电压（Vt）、导通电阻（Rdson）、漏电流（Igss）等。</p>
    </div>

    <!-- FT可靠性 -->
    <div style="background:linear-gradient(135deg,#6ab8c7 0%,#a3e0ed 100%);border-radius:10px;padding:14px;color:#0e3d45;">
      <h4 style="margin:0 0 8px 0;font-size:12px;display:flex;align-items:center;gap:8px;">
        <span style="background:rgba(255,255,255,0.35);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">FT可靠性</span>
        <span style="font-size:11px;opacity:0.75;font-weight:500;">—— 老化电性测试</span>
      </h4>
      <p style="margin:0 0 6px 0;font-size:12px;line-height:1.5;opacity:0.85;"><strong>目的：</strong>在芯片封装完成后，对封装好芯片进行最终功能性验证。芯片制造过程中的最后一道检验环节，确保每个芯片在实际工作条件下的可靠性和性能符合要求。</p>
      <p style="margin:0 0 6px 0;font-size:12px;line-height:1.5;opacity:0.85;"><strong>验证芯片功能：</strong>关注芯片是否能够在严格的规格要求下执行预期功能，它对芯片的工作温度、电压等进行多种测试，确保芯片在不同环境条件下能够稳定工作。</p>
      <p style="margin:0;font-size:12px;line-height:1.5;opacity:0.85;"><strong>检测封装引起性能变化：</strong>由于封装过程中，芯片的温度、电气环境和物理形态可能发生变化，FT测试能够确认封装是否影响芯片性能，尤其是高频高功率产品。</p>
    </div>
  </div>
</div>
<div class="callout callout-success">
  <div class="callout-title">验证链路要点总结</div>
  <p>整个产品验证链路从<strong>商机阶段</strong>开始，依次经过 <strong>PRS（工艺验证）→ STR（小批量验证）→ MSTR（中批量验证）→ FullRLS（全面量产）</strong>四个阶段。每个验证阶段都包含<strong>WAT测试、CP测试、FT可靠性测试</strong>三大核心测试环节，形成从晶圆级到封装级再到最终功能级的完整质量保障体系。理解这一完整链路有助于你向客户解释硅片产品在各个验证节点中的作用和质量控制逻辑。</p>
</div>`,
"s10-5":`<div class="chapter-header">

</ul>`,

// Flatten items
let ALL_ITEMS=[];
MODULES.forEach((mod,mi)=>{mod.items.forEach(item=>{ALL_ITEMS.push({...item,moduleIdx:mi,moduleTitle:mod.title})})});
let currentIdx=0;
let isLanding=true;
function init(){renderNav();showLanding();setupSearch();setupSidebarToggle();setupScrollTop()}
function showLanding(){isLanding=true;document.getElementById('content').innerHTML=CONTENT['landing'];document.getElementById('breadcrumb').innerHTML='<span style=\"color:var(--text2)\">知识库首页</span>';document.querySelector('.nav-buttons').style.display='none';document.getElementById('progressFill').style.width='0%';document.getElementById('progressText').textContent='0/60';document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));fillLandingToc();window.scrollTo({top:0,behavior:'smooth'})}
function fillLandingToc(){const tocEl=document.getElementById('landingToc');if(!tocEl)return;let html='';ALL_ITEMS.forEach((item,idx)=>{const isFirstInMod=item.mod===1||idx===0;const isNewMod=isFirstInMod&&(idx===0||ALL_ITEMS[idx-1].moduleTitle!==item.moduleTitle);if(isNewMod&&idx>0)html+='</div></div>';if(isNewMod){html+=`<div class="landing-toc-mod ${item.moduleIdx===0?'expanded':''}" data-mi="${item.moduleIdx}"><div class="landing-toc-mod-title" onclick="toggleTocMod(this)">${item.moduleTitle}<span class="toc-arrow">&#9654;</span></div><div class="landing-toc-items">`}html+=`<div class="landing-toc-item" onclick="loadChapter(${idx})"><span class="toc-idx">${item.mod}/${item.tot}</span><span class="toc-title">${item.title}</span></div>`});if(ALL_ITEMS.length>0)html+='</div></div>';tocEl.innerHTML=html}
function toggleTocMod(el){el.closest('.landing-toc-mod').classList.toggle('expanded')}
function enterStudy(){isLanding=false;document.querySelector('.nav-buttons').style.display='';loadChapter(0)}
function exitToLanding(){showLanding()}
function renderNav(){const tree=document.getElementById('navTree');let html='';MODULES.forEach((mod,mi)=>{html+=`<div class="nav-group ${mi===0?'expanded':''}" data-mi="${mi}"><div class="nav-group-title" onclick="toggleGroup(${mi})"><span>${mod.title}</span><span class="arrow">&#9654;</span></div><div class="nav-group-items">`;let offset=0;for(let i=0;i<mi;i++)offset+=MODULES[i].items.length;mod.items.forEach((item,ii)=>{const gi=offset+ii;html+=`<div class="nav-item ${gi===0?'active':''}" data-idx="${gi}" onclick="loadChapter(${gi})"><span class="idx">${item.mod}/${item.tot}</span>${item.title}</div>`});html+=`</div></div>`});tree.innerHTML=html}
function toggleGroup(mi){document.querySelectorAll('.nav-group')[mi].classList.toggle('expanded')}
function loadChapter(idx){if(idx<0||idx>=ALL_ITEMS.length)return;isLanding=false;currentIdx=idx;const item=ALL_ITEMS[idx];const html=CONTENT[item.id]||`<div class="chapter-header"><h2>${item.title}</h2><p>内容准备中...</p></div>`;document.getElementById('content').innerHTML=html;document.querySelector('.nav-buttons').style.display='';document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));const activeEl=document.querySelector(`.nav-item[data-idx="${idx}"]`);if(activeEl){activeEl.classList.add('active');const group=activeEl.closest('.nav-group');if(group&&!group.classList.contains('expanded'))group.classList.add('expanded');activeEl.scrollIntoView({behavior:'smooth',block:'nearest'})}document.getElementById('breadcrumb').innerHTML=`知识库 / <span>${item.moduleTitle}</span> / ${item.title}`;updateNavButtons();updateProgress();window.scrollTo({top:0,behavior:'smooth'})}
function updateNavButtons(){const prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),prevTitle=document.getElementById('prevTitle'),nextTitle=document.getElementById('nextTitle'),indicator=document.getElementById('chapterIndicator');if(currentIdx>0){prevBtn.classList.remove('disabled');prevTitle.textContent=ALL_ITEMS[currentIdx-1].title}else{prevBtn.classList.add('disabled');prevTitle.textContent='无'}if(currentIdx<ALL_ITEMS.length-1){nextBtn.classList.remove('disabled');nextTitle.textContent=ALL_ITEMS[currentIdx+1].title}else{nextBtn.classList.add('disabled');nextTitle.textContent='完成'}indicator.textContent=`${currentIdx+1} / ${ALL_ITEMS.length}`}
function updateProgress(){const pct=((currentIdx+1)/ALL_ITEMS.length*100).toFixed(0);document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=`${currentIdx+1}/${ALL_ITEMS.length}`}
function goPrev(){loadChapter(currentIdx-1)}
function goNext(){loadChapter(currentIdx+1)}
function setupSearch(){const input=document.getElementById('searchInput'),results=document.getElementById('searchResults');input.addEventListener('input',function(){const q=this.value.trim().toLowerCase();if(!q){results.style.display='none';return}const matches=ALL_ITEMS.filter(item=>item.title.toLowerCase().includes(q)||item.moduleTitle.toLowerCase().includes(q)).slice(0,10);if(matches.length===0){results.innerHTML='<div class="search-result-item">无匹配结果</div>'}else{results.innerHTML=matches.map(m=>{const gIdx=ALL_ITEMS.indexOf(m);return`<div class="search-result-item" onclick="loadChapter(${gIdx});document.getElementById('searchResults').style.display='none'"><div class="res-title">${m.title}</div><div class="res-path">${m.moduleTitle} · ${m.mod}/${m.tot}</div></div>`}).join('')}results.style.display='block'});document.addEventListener('click',function(e){if(!e.target.closest('.search-box')&&!e.target.closest('.search-results'))results.style.display='none'})}
function setupSidebarToggle(){const toggle=document.getElementById('sidebarToggle'),sidebar=document.getElementById('sidebar'),main=document.getElementById('main');toggle.addEventListener('click',function(){sidebar.classList.toggle('collapsed');main.style.marginLeft=sidebar.classList.contains('collapsed')?'0':'';toggle.innerHTML=sidebar.classList.contains('collapsed')?'&#9654;':'&#9664;'})}
function setupScrollTop(){const btn=document.getElementById('toTop');window.addEventListener('scroll',function(){btn.classList.toggle('show',window.scrollY>300)})}
document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||isLanding)return;if(e.key==='ArrowLeft'||e.key==='ArrowUp')goPrev();if(e.key==='ArrowRight'||e.key==='ArrowDown')goNext()});
init();
</script>
