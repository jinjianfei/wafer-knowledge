<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>半导体硅片材料 · 完整知识库</title>
<style>
:root{--bg:#f5f6fa;--sidebar-bg:#1e293b;--sidebar-w:320px;--accent:#2563eb;--accent2:#0ea5e9;--text:#1e293b;--text2:#475569;--border:#e2e8f0;--card:#ffffff;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;--code-bg:#f1f5f9}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);color:#cbd5e1;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
.sidebar.collapsed{transform:translateX(-100%)}
.sidebar-header{padding:20px;border-bottom:1px solid #334155}
.sidebar-header h1{font-size:18px;color:#fff;margin-bottom:4px}
.sidebar-header p{font-size:12px;color:#94a3b8}
.search-box{padding:12px 20px;border-bottom:1px solid #334155}
.search-box input{width:100%;padding:8px 12px;border-radius:6px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-results{max-height:200px;overflow-y:auto;padding:0 20px;border-bottom:1px solid #334155}
.search-result-item{padding:6px 0;font-size:12px;cursor:pointer;color:#94a3b8;border-bottom:1px solid #1e293b}
.search-result-item:hover{color:#60a5fa}
.search-result-item .res-title{color:#e2e8f0;font-weight:500}
.search-result-item .res-path{font-size:11px;color:#64748b}
.nav-tree{flex:1;overflow-y:auto;padding:8px 0}
.nav-tree::-webkit-scrollbar{width:6px}
.nav-tree::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
.nav-group{margin-bottom:2px}
.nav-group-title{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;font-size:13px;font-weight:600;color:#94a3b8;cursor:pointer;user-select:none;text-transform:uppercase;letter-spacing:.5px}
.nav-group-title:hover{color:#e2e8f0;background:#0f172a}
.nav-group-title .arrow{transition:transform .2s;font-size:10px}
.nav-group.expanded .arrow{transform:rotate(90deg)}
.nav-group-items{display:none}
.nav-group.expanded .nav-group-items{display:block}
.nav-item{display:flex;align-items:center;padding:7px 20px 7px 36px;font-size:13px;color:#cbd5e1;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:#0f172a;color:#fff}
.nav-item.active{background:#0f172a;color:#60a5fa;border-left-color:var(--accent)}
.nav-item .idx{font-size:11px;color:#64748b;margin-right:8px;min-width:28px}
.nav-item.active .idx{color:#60a5fa}
.sidebar-toggle{position:fixed;left:var(--sidebar-w);top:50%;transform:translateY(-50%);width:24px;height:48px;background:var(--sidebar-bg);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:0 6px 6px 0;z-index:99;font-size:12px}
.sidebar.collapsed ~ .sidebar-toggle{left:0}
.main{flex:1;margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.breadcrumb{font-size:13px;color:var(--text2)}
.breadcrumb span{color:var(--accent);font-weight:500}
.topbar-actions{display:flex;gap:8px;align-items:center}
.progress-bar{width:120px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.progress-text{font-size:11px;color:var(--text2);margin-left:8px}
.content{flex:1;padding:32px;max-width:960px}
.chapter{display:none;animation:fadeIn .3s}
.chapter.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.chapter-header{margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.chapter-header .chap-num{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:1px}
.chapter-header h2{font-size:28px;margin-top:8px}
.chapter-header .chap-desc{color:var(--text2);margin-top:8px;font-size:15px}
h3{font-size:20px;margin:28px 0 14px;color:var(--text);display:flex;align-items:center;gap:8px}
h3::before{content:"";display:inline-block;width:4px;height:20px;background:var(--accent);border-radius:2px}
h4{font-size:16px;margin:20px 0 10px;color:var(--text)}
p{margin-bottom:12px;color:var(--text);font-size:15px}
strong{color:var(--text);font-weight:600}
.table-wrap{overflow-x:auto;margin:16px 0}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
th{background:#f8fafc;text-align:left;padding:10px 14px;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
tr:hover td{background:#f8fafc}
.callout{padding:16px 20px;border-radius:8px;margin:16px 0;border-left:4px solid;font-size:14px}
.callout-info{background:#eff6ff;border-color:var(--accent)}
.callout-warn{background:#fffbeb;border-color:var(--warn)}
.callout-success{background:#ecfdf5;border-color:var(--success)}
.callout-danger{background:#fef2f2;border-color:var(--danger)}
.callout-title{font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.code-block{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:14px 18px;font-family:"JetBrains Mono",Consolas,monospace;font-size:13px;margin:12px 0;overflow-x:auto}
.tag{display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:500;margin-right:4px}
.tag-blue{background:#dbeafe;color:#1d4ed8}
.tag-green{background:#d1fae5;color:#065f46}
.tag-orange{background:#ffedd5;color:#9a3412}
.tag-purple{background:#f3e8ff;color:#7e22ce}
ul,ol{margin:10px 0 10px 24px}
li{margin-bottom:6px;font-size:14px}
.kv-grid{display:grid;grid-template-columns:140px 1fr;gap:8px 16px;font-size:14px;margin:12px 0}
.kv-grid .k{color:var(--text2);font-weight:500}
.kv-grid .v{color:var(--text)}
.nav-buttons{display:flex;justify-content:space-between;align-items:center;padding:24px 32px;border-top:1px solid var(--border);background:var(--card);margin-top:auto}
.nav-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-size:14px;cursor:pointer;transition:all .15s;text-decoration:none}
.nav-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-btn.disabled{opacity:.35;pointer-events:none}
.nav-btn .label{font-size:12px;color:var(--text2)}
.nav-btn:hover .label{color:rgba(255,255,255,.7)}
.chapter-indicator{font-size:13px;color:var(--text2)}
.to-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;background:var(--accent);color:#fff;border:none;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(37,99,235,.3);z-index:60;font-size:16px}
.to-top.show{display:flex}
/* ===== Landing Page Styles ===== */
.landing-page{display:flex;flex-direction:column;min-height:calc(100vh - 64px);animation:fadeIn .5s}
.landing-hero{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0ea5e9 100%);position:relative;overflow:hidden;padding:48px 40px 56px;border-radius:0 0 24px 24px;color:#fff}
.landing-hero::before{content:'';position:absolute;top:-50%;right:-20%;width:500px;height:500px;background:rgba(14,165,233,.08);border-radius:50%}
.landing-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:rgba(37,99,235,.06);border-radius:50%}
.landing-hero-content{position:relative;z-index:2}
.landing-hero h2{font-size:36px;margin:0 0 8px;font-weight:700;letter-spacing:-.5px}
.landing-hero .subtitle{font-size:17px;color:#94a3b8;margin:0 0 24px}
.landing-hero .author{font-size:14px;color:#60a5fa;font-style:italic;margin:0 0 32px}
.landing-stats{display:flex;gap:32px;flex-wrap:wrap}
.landing-stat{display:flex;align-items:center;gap:12px}
.landing-stat .num{font-size:32px;font-weight:700;color:#38bdf8}
.landing-stat .label{font-size:13px;color:#94a3b8;line-height:1.4}
.landing-body{padding:32px 40px}
.landing-section-title{font-size:18px;font-weight:600;color:var(--text);margin:0 0 20px;display:flex;align-items:center;gap:8px}
.landing-section-title::before{content:'';display:inline-block;width:4px;height:20px;background:var(--accent);border-radius:2px}
.landing-modules{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:32px}
.landing-mod-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.landing-mod-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08);border-color:var(--accent)}
.landing-mod-card .mod-num{position:absolute;top:10px;right:14px;font-size:36px;font-weight:700;color:rgba(37,99,235,.08);line-height:1}
.landing-mod-card .mod-title{font-size:14px;font-weight:600;color:var(--text);margin:0 0 6px;padding-right:28px}
.landing-mod-card .mod-count{font-size:12px;color:var(--text2);margin:0 0 10px}
.landing-mod-card .mod-chips{display:flex;flex-wrap:wrap;gap:4px}
.landing-mod-card .chip{font-size:11px;padding:2px 8px;border-radius:4px;background:#eff6ff;color:#1d4ed8;font-weight:500}
.landing-mod-card:hover .chip{background:#dbeafe}
.landing-start{display:flex;justify-content:center;padding:16px 0 32px}
.landing-start-btn{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;border:none;padding:14px 48px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(37,99,235,.3)}
.landing-start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.4)}
.landing-featured{background:linear-gradient(135deg,#eff6ff 0%,#f0f9ff 100%);border:1px solid #dbeafe;border-radius:12px;padding:20px;margin-bottom:32px}
.landing-featured h4{margin:0 0 12px;color:#1e40af;font-size:14px}
.landing-featured p{margin:0;color:#475569;font-size:13px;line-height:1.7}
/* Landing TOC */
.landing-toc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.landing-toc-mod{margin-bottom:18px}
.landing-toc-mod:last-child{margin-bottom:0}
.landing-toc-mod-title{font-size:14px;font-weight:600;color:var(--text);margin:0 0 8px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:4px 0}
.landing-toc-mod-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px;flex-shrink:0}
.landing-toc-mod-title .toc-arrow{font-size:10px;color:var(--text2);transition:transform .2s;margin-left:auto}
.landing-toc-mod.expanded .toc-arrow{transform:rotate(90deg)}
.landing-toc-items{display:none;padding-left:12px;border-left:2px solid #e2e8f0;margin-left:1px}
.landing-toc-mod.expanded .landing-toc-items{display:block}
.landing-toc-item{display:flex;align-items:center;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;text-decoration:none;margin-bottom:2px}
.landing-toc-item:hover{background:#eff6ff;color:var(--accent)}
.landing-toc-item .toc-idx{font-size:11px;color:var(--text2);margin-right:10px;min-width:28px;text-align:right;flex-shrink:0}
.landing-toc-item:hover .toc-idx{color:var(--accent)}
.landing-toc-item .toc-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:768px){.landing-hero{padding:32px 20px 40px}.landing-hero h2{font-size:26px}.landing-body{padding:24px 20px}.landing-modules{grid-template-columns:1fr}.landing-stats{gap:20px}.landing-toc{padding:16px}}
@media(max-width:768px){.sidebar{width:260px}.main{margin-left:0}.content{padding:20px}.topbar{padding:12px 20px}.nav-buttons{padding:16px 20px}}
</style>
</head>
<body>

<div class="sidebar-header" onclick="exitToLanding()" style="cursor:pointer;" title="点击返回首页"><h1>半导体硅片材料</h1><p>完整技术知识库 · 60个知识章节</p><p style="font-size:11px;color:#60a5fa;margin-top:6px;font-style:italic;">Created By Alex Jin</p></div>

</main>
</div>

"s1-1":`<div class="chapter-header">
  <div class="chap-num">模块一 · 第 1/10 节</div>
  <h2>半导体材料概述与能带理论</h2>
  <div class="chap-desc">理解半导体为什么能导电，以及硅在其中扮演什么角色</div>
</div>
<h3>什么是半导体</h3>
<p>半导体（Semiconductor）是导电能力介于导体（如铜、铝）和绝缘体（如玻璃、陶瓷）之间的一类材料。半导体的独特之处在于：<strong>它的导电能力可以通过掺杂、温度、光照、电场等外界条件精确调控</strong>。这种可控性是半导体成为现代电子工业基石的根本原因。</p>
<p>常见的半导体材料包括：<span class="tag tag-blue">元素半导体</span> 硅（Si）、锗（Ge）；<span class="tag tag-green">化合物半导体</span> 砷化镓（GaAs）、氮化镓（GaN）、碳化硅（SiC）等。其中，<strong>硅占据了全球半导体材料约95%的市场份额</strong>，是当之无愧的"半导体之王"。</p>
<div class="callout callout-info">
  <div class="callout-title">为什么硅成为主流？</div>
  <p>（1）地壳中含量丰富（约26%），原料成本极低；（2）天然氧化层SiO₂质量极高，是理想的栅介质和钝化层；（3）机械强度高、热稳定性好，可承受1000℃以上高温工艺；（4）与现有微加工工艺完全兼容，产业链极其成熟。</p>
</div>
<h3>能带理论基础</h3>
<p>要理解半导体为什么能导电，必须先理解<strong>能带理论（Band Theory）</strong>。在固体中，大量的原子紧密排列，每个原子的电子轨道相互交叠，原本分立的能级分裂成连续的<strong>能带（Energy Band）</strong>。对于半导体，我们最关心两个能带：</p>
<ul>
  <li><strong>价带（Valence Band, VB）</strong>：能量较低的能带，在绝对零度时被电子完全填满，电子被束缚在原子周围，不能自由移动</li>
  <li><strong>导带（Conduction Band, CB）</strong>：能量较高的能带，在绝对零度时完全空置，其中的电子可以自由移动、参与导电</li>
</ul>
<p>价带顶和导带底之间的能量差称为<strong>禁带宽度（Band Gap, E<sub>g</sub>）</strong>。硅的禁带宽度为 <strong>1.12 eV</strong>（在300K时）。这个数值决定了：硅在室温下已有少量电子从价带跃迁到导带（本征载流子浓度约1×10¹⁰ cm⁻³），因此具有一定的导电能力；但又不像导体那样自由电子极多，所以导电能力适中。</p>
<div class="code-block">
  导体：E<sub>g</sub> ≈ 0（导带与价带重叠或极窄）<br>
  半导体：E<sub>g</sub> ≈ 0.5 ~ 3.5 eV（硅：1.12 eV）<br>
  绝缘体：E<sub>g</sub> > 5 eV（SiO₂：约9 eV）
</div>
<h3>本征激发与载流子对</h3>
<p>在室温下，硅晶格中的部分价电子获得足够的热能，跃过禁带进入导带，成为<strong>自由电子（Free Electron）</strong>；同时在价带中留下一个空位，称为<strong>空穴（Hole）</strong>。电子和空穴总是成对出现，称为<strong>电子-空穴对（Electron-Hole Pair, EHP）</strong>。这种由热激发产生的载流子过程称为<strong>本征激发（Intrinsic Excitation）</strong>。</p>
<p>在纯净（未掺杂）的硅中，电子浓度 n 和空穴浓度 p 相等，都等于<strong>本征载流子浓度 n<sub>i</sub></strong>：n = p = n<sub>i</sub> ≈ <strong>1.0 × 10¹⁰ cm⁻³</strong>（300K时）。这个数值看起来很大，但与硅的原子密度（约5×10²² cm⁻³）相比，只有约五百万亿分之一的原子贡献了载流子，因此本征硅的导电性仍然很差，电阻率高达 <strong>2.3 × 10⁵ Ω·cm</strong>。</p>`,
"s1-2":`<div class="chapter-header">
  <div class="chap-num">模块一 · 第 2/10 节</div>
  <h2>本征硅与掺杂硅的基本概念</h2>
  <div class="chap-desc">从绝缘般的本征硅到可控导电的外延硅</div>
</div>
<h3>本征硅（Intrinsic Silicon）</h3>
<p><strong>本征硅</strong>是指完全纯净、未掺杂任何杂质原子的硅晶体。在本征硅中，载流子仅来源于本征激发，电子浓度和空穴浓度严格相等：n = p = n<sub>i</sub> ≈ 1.0×10¹⁰ cm⁻³。由于载流子浓度极低，本征硅的电阻率极高（约<strong>2.3×10⁵ Ω·cm</strong>），接近绝缘体，无法直接用于制造半导体器件。</p>
<p>但在硅片公司的产品线中，有一类接近本征态的产品——<strong>高阻硅片（High-Resistivity Wafer）</strong>。这类硅片的电阻率可达数千甚至上万Ω·cm，主要用于射频器件（RF）、高压功率器件和某些特殊传感器。高阻硅片的制造需要极低的掺杂浓度和极高的晶体纯度，技术难度很高。</p>
<h3>外延硅（Extrinsic Silicon）</h3>
<p>为了使硅能够导电并被用于制造器件，必须通过<strong>掺杂（Doping）</strong>在硅中引入额外的载流子。<strong>外延硅</strong>就是通过人为引入杂质原子（掺杂剂）来改变载流子浓度的硅材料。掺杂后的硅称为<strong>非本征硅（Extrinsic Silicon）</strong>，其载流子浓度和导电性可由掺杂浓度精确控制。</p>
<p>掺杂的原理是在硅晶格中引入与硅原子价电子数不同的杂质原子：掺入<strong>五价元素</strong>（如磷P、砷As、锑Sb，属周期表第V族）会引入多余电子，形成<strong>N型硅</strong>；掺入<strong>三价元素</strong>（如硼B、铝Al、镓Ga，属周期表第III族）会引入空穴，形成<strong>P型硅</strong>。掺杂浓度通常在 <strong>10¹⁴ ~ 10²¹ atoms/cm³</strong> 范围内。</p>
<div class="callout callout-success">
  <div class="callout-title">掺杂的核心意义</div>
  <p>掺杂将硅的电阻率从约2.3×10⁵ Ω·cm（本征态）降低到 0.001 ~ 10000+ Ω·cm 的宽范围，使硅的导电性可以被精确调控，从而满足不同器件的需求。这是半导体工业能够发展的物理基础。</p>
</div>
<h3>N型硅与P型硅的形成</h3>
<p><strong>N型硅</strong>：当五价杂质原子（如磷）取代硅原子时，5个价电子中有4个参与形成共价键，多余的一个电子只需很小的能量（施主电离能，约几十meV）就能脱离束缚，进入导带成为自由电子。在室温下，施主杂质几乎完全电离，每个施主原子贡献一个自由电子。因此N型硅的<strong>多数载流子（多子）是电子</strong>，<strong>少数载流子（少子）是空穴</strong>。</p>
<p><strong>P型硅</strong>：当三价杂质原子（如硼）取代硅原子时，只有3个价电子参与形成共价键，缺少一个电子形成<strong>空穴</strong>。邻近硅原子的价电子只需很小能量就能填补这个空穴，相当于空穴在移动。在室温下，受主杂质也几乎完全电离。因此P型硅的<strong>多子是空穴</strong>，<strong>少子是电子</strong>。</p>
