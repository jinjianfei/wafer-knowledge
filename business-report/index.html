<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商务报告逻辑</title>
<style>
:root{--bg:#f5f6fa;--accent:#2563eb;--text:#1e293b;--text2:#475569}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.container{max-width:480px}
.icon{font-size:64px;margin-bottom:24px;display:block}
h1{font-size:28px;margin-bottom:12px}
p{color:var(--text2);font-size:16px;line-height:1.7;margin-bottom:32px}
.back-btn{display:inline-block;background:var(--accent);color:#fff;padding:12px 32px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:500;transition:all .2s}
.back-btn:hover{background:#1d4ed8;transform:translateY(-2px)}
.footer{position:fixed;bottom:20px;font-size:12px;color:#94a3b8}
</style>
</head>
<body>
<div class="container">
  <span class="icon">&#128221;</span>
  <h1>商务报告逻辑</h1>
  <p>该知识库正在筹备中，敬请期待。<br>将涵盖华为"一报一会"方法论、商务报告结构设计、逻辑表达、数据呈现与汇报技巧等完整体系。</p>
  <a href="../index.html" class="back-btn">返回主页</a>
  <div class="footer">Created By Alex Jin</div>
</div>
</body>
</html>
